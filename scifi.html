<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button onclick="insertFunc('sin')">sin</button>
    <button onclick="insertFunc('cos')">cos</button>
    <button onclick="insertFunc('tan')">tan</button>
    <button onclick="insertFunc('sqrt')">√</button>
    <button onclick="clearDisplay()">C</button>

    <button onclick="insertSquare()">x²</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('*')">×</button>
    <button onclick="append('Math.PI')">π</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('-')">−</button>
    <button onclick="append('.')">.</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('+')">+</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="zero" onclick="append('0')">0</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
